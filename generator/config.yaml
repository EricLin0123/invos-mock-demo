# config.yaml — tunable parameters for the simple invoice generator.
# Same seed + same config => byte-identical NDJSON output.

seed: 42                     # default RNG seed (override with --seed)
count: 100000               # number of invoices to generate (override with --count)

start_date: "2025-01-01"    # earliest invoice_date
days: 90                     # invoice_date is drawn uniformly across [start_date, start_date+days)

items_min: 1                 # items per invoice, drawn uniformly in [items_min, items_max]
items_max: 6
quantity_min: 1              # per-item quantity, drawn uniformly in [quantity_min, quantity_max]
quantity_max: 3

# Sellers are picked at random per invoice. tax_id must be 8 digits.
sellers:
  - { name: "FamilyMart Da'an",   tax_id: "12345678" }
  - { name: "7-Eleven Xinyi",     tax_id: "23456789" }
  - { name: "PXMart Zhongshan",   tax_id: "34567890" }
  - { name: "Carrefour Neihu",    tax_id: "45678901" }
  - { name: "Watsons Ximending",  tax_id: "56789012" }

# Commodity catalog: category -> integer NTD price range, optional brands, descriptions.
# A line item picks a random category, then a random description (and brand, if any).
commodities:
  toothpaste:
    price_min: 45
    price_max: 120
    brands: ["BrightMint", "PearlGuard", "FreshWave"]
    descriptions: ["Toothpaste 150g", "Toothpaste 200g Family Pack", "Whitening Toothpaste"]
  snacks:
    price_min: 20
    price_max: 80
    descriptions: ["Potato Chips", "Rice Crackers", "Chocolate Bar", "Mixed Nuts"]
  beverages:
    price_min: 15
    price_max: 60
    descriptions: ["Bottled Tea", "Canned Coffee", "Sports Drink", "Mineral Water"]
  instant_noodles:
    price_min: 25
    price_max: 70
    descriptions: ["Beef Noodles Cup", "Spicy Ramen Pack", "Seafood Noodles"]
  shampoo:
    price_min: 90
    price_max: 250
    brands: ["CleanHair", "SilkyShine"]
    descriptions: ["Shampoo 400ml", "Anti-Dandruff Shampoo", "Conditioner 350ml"]
  household_goods:
    price_min: 30
    price_max: 300
    descriptions: ["Paper Towels", "Dish Soap", "Trash Bags", "Laundry Detergent"]

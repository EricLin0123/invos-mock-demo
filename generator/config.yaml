# config.yaml — tunable parameters for the simple invoice generator.
# Same seed + same config => identical numeric output (the invoice_date is always "today",
# i.e. the run date, so invoices are never months apart).

seed: 42                     # default RNG seed (override with --seed)
count: 100000               # number of invoices to generate (override with --count)

users: 5000                  # distinct consumers; each has a stable carrier_id (the user key)
anonymous_rate: 0.10         # fraction of invoices with no carrier (carrier_id = null)

items_min: 1                 # items per invoice, drawn uniformly in [items_min, items_max]
items_max: 6
quantity_min: 1              # per-item quantity, drawn uniformly in [quantity_min, quantity_max]
quantity_max: 3

# Sellers are picked at random per invoice. tax_id must be 8 digits.
sellers:
  - { name: "FamilyMart Da'an",   tax_id: "12345678" }
  - { name: "7-Eleven Xinyi",     tax_id: "23456789" }
  - { name: "PXMart Zhongshan",   tax_id: "34567890" }
  - { name: "Carrefour Neihu",    tax_id: "45678901" }
  - { name: "Watsons Ximending",  tax_id: "56789012" }

# Commodity catalog: category -> integer NTD price range and descriptions.
# A line item picks a category uniformly at random, then a random description.
# No brands — pure generic commodities.
commodities:
  snacks:
    price_min: 20
    price_max: 80
    descriptions: ["Potato Chips", "Rice Crackers", "Chocolate Bar", "Mixed Nuts"]
  beverages:
    price_min: 15
    price_max: 60
    descriptions: ["Bottled Tea", "Canned Coffee", "Sports Drink", "Mineral Water"]
  instant_noodles:
    price_min: 25
    price_max: 70
    descriptions: ["Beef Noodles Cup", "Spicy Ramen Pack", "Seafood Noodles"]
  household_goods:
    price_min: 30
    price_max: 300
    descriptions: ["Paper Towels", "Dish Soap", "Trash Bags", "Laundry Detergent"]
  toiletries:
    price_min: 30
    price_max: 250
    descriptions: ["Shampoo 400ml", "Body Wash", "Toothpaste 150g", "Hand Soap"]
  stationery:
    price_min: 10
    price_max: 150
    descriptions: ["Notebook", "Ballpoint Pen", "Sticky Notes", "A4 Paper Ream"]
  produce:
    price_min: 15
    price_max: 200
    descriptions: ["Apples 1kg", "Bananas", "Leafy Greens", "Tomatoes 500g"]

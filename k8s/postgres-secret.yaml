# Demo-only Postgres credentials. These match server/src/db.js defaults
# (invos / devonly / invoices) and the legacy docker-compose.yml. NOT for production —
# stringData is plaintext in the manifest on purpose so the demo is self-contained.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: invos
type: Opaque
stringData:
  POSTGRES_USER: invos
  POSTGRES_PASSWORD: devonly
  POSTGRES_DB: invoices
  # Full URL the app + jobs consume. Points at PgBouncer (see pgbouncer.yaml); the
  # migrate Job overrides this to hit Postgres directly for DDL.
  DATABASE_URL: postgres://invos:devonly@pgbouncer:6432/invoices
  # Direct connection (bypasses the pooler) — used by the migrate Job.
  DATABASE_URL_DIRECT: postgres://invos:devonly@postgres:5432/invoices

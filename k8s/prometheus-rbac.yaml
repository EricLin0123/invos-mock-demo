# RBAC so Prometheus can use Kubernetes service-discovery: it must list/watch pods,
# services, endpoints and nodes to find the ever-changing set of ingest pods to scrape.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: invos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: invos-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: invos-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: invos-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: invos

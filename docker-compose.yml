# Docker Compose for invos-mock-demo.
#   Step 1: PostgreSQL.
#   Step 5: Prometheus + Grafana for monitoring (this file).
# `docker compose up -d` brings up the whole observability stack. The Fastify ingestion
# server still runs on the host (port 8473) — Prometheus reaches it via host.docker.internal.

services:
  postgres:
    image: postgres:16
    container_name: invos-postgres
    environment:
      # demo-only credentials
      POSTGRES_USER: invos
      POSTGRES_PASSWORD: devonly
      POSTGRES_DB: invoices
    ports:
      - "5432:5432"
    volumes:
      - invos-pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready confirms the server accepts connections before dependents start.
      test: ["CMD-SHELL", "pg_isready -U invos -d invoices"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: invos-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      # Let k6 push its metrics in via remote-write (Step 4's optional -o prometheus-rw).
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=6h"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - invos-prometheus-data:/prometheus
    # The Fastify server runs on the host, not in compose. host-gateway maps
    # host.docker.internal to the host so the scrape target below resolves on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: invos-grafana
    depends_on:
      - prometheus
      - postgres
    ports:
      # Host 8474 -> container 3000, to avoid colliding with other local Grafanas / dev apps.
      # Override the host port with GRAFANA_PORT if 8474 is already taken on your machine.
      - "${GRAFANA_PORT:-8474}:3000"
    environment:
      # Local demo only: anonymous viewers can see the dashboards with no login; admin
      # login still exists for editing, password overridable via env.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_DEFAULT_THEME: "light"
    volumes:
      # Provisioning (datasources + dashboard provider) and the dashboard JSON, all as code.
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - invos-grafana-data:/var/lib/grafana

volumes:
  invos-pgdata:
  invos-prometheus-data:
  invos-grafana-data:

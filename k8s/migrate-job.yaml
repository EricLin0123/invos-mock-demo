# Schema migration as a one-shot Job, replacing `npm run migrate`. Runs the same image as
# the Deployment but with a different command. Idempotent: migrate.js records applied files
# in schema_migrations, so re-running `up` is safe.
#
# Connects DIRECTLY to Postgres (not PgBouncer): DDL and the migration bookkeeping prefer a
# dedicated session, and transaction-pooling can interfere with multi-statement DDL.
#
# NOTE: run.sh deletes any prior Job before re-applying, because a Job's pod template is
# immutable once created.
apiVersion: batch/v1
kind: Job
metadata:
  name: invos-migrate
  namespace: invos
  labels:
    app: invos-migrate
spec:
  backoffLimit: 6
  # Reap finished Jobs after a few minutes so repeated `up`s stay tidy.
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: invos-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: invos-ingest:dev
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/migrate.js"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL_DIRECT
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

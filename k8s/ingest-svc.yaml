# Stable front door for the autoscaled ingest pods. Two consumers:
#   - in-cluster (Prometheus, Grafana checks): ClusterIP DNS `invos-ingest:8473`
#   - host k6: the NodePort 30847, surfaced on localhost:8473 by kind's extraPortMappings
# The Service tracks pods by label, so it always points at the *current* HPA-managed set.
apiVersion: v1
kind: Service
metadata:
  name: invos-ingest
  namespace: invos
  labels:
    app: invos-ingest
spec:
  type: NodePort
  selector:
    app: invos-ingest
  ports:
    - name: http
      port: 8473
      targetPort: 8473
      nodePort: 30847
